<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyVault – Smart Study Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #f0a500;
    --accent2: #e05c2a;
    --text: #e8eaf0;
    --muted: #7a8499;
    --success: #2ecc71;
    --danger: #e74c3c;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text); }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .breadcrumb .crumb {
    cursor: pointer;
    transition: color 0.2s;
    font-weight: 500;
  }
  .breadcrumb .crumb:hover { color: var(--accent); }
  .breadcrumb .sep { color: var(--border); }
  .breadcrumb .current { color: var(--text); font-weight: 600; }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
  }

  /* ── PAGE TITLE ── */
  .page-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }
  .page-subtitle {
    color: var(--muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  /* ── GRID ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transition: transform 0.25s ease;
    transform-origin: left;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(240,165,0,0.1);
  }
  .card:hover::before { transform: scaleX(1); }

  .card-icon {
    font-size: 2rem;
    margin-bottom: 0.75rem;
    display: block;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    margin-bottom: 0.3rem;
  }

  .card-meta {
    font-size: 0.8rem;
    color: var(--muted);
  }

  /* ── ADD BUTTON ── */
  .add-card {
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    gap: 0.5rem;
  }
  .add-card:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,165,0,0.04);
  }
  .add-card svg { width: 28px; height: 28px; }

  /* ── CHAPTER LIST ── */
  .chapter-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
  }

  .chapter-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .chapter-item:hover { border-color: var(--accent); }

  .chapter-header {
    display: flex;
    align-items: center;
    padding: 1rem 1.25rem;
    cursor: pointer;
    gap: 1rem;
  }

  .chapter-num {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.8rem;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .chapter-name {
    font-weight: 600;
    font-size: 0.95rem;
    flex: 1;
  }

  .chapter-toggle {
    color: var(--muted);
    transition: transform 0.3s;
    font-size: 1.2rem;
  }
  .chapter-item.open .chapter-toggle { transform: rotate(180deg); }

  .chapter-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 1px solid var(--border);
  }
  .chapter-item.open .chapter-body { display: block; }

  /* material inside chapter */
  .material-list {
    list-style: none;
    margin: 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .material-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-size: 0.9rem;
  }

  .material-type {
    font-size: 1rem;
  }

  .material-name { flex: 1; }

  .material-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .material-link:hover {
    background: var(--accent);
    color: #000;
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.9rem;
    transition: color 0.2s;
    padding: 2px;
  }
  .del-btn:hover { color: var(--danger); }

  /* ── ADD MATERIAL FORM ── */
  .add-material-form {
    background: var(--surface2);
    border-radius: 10px;
    padding: 1rem;
    margin-top: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .form-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.55rem 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
    flex: 1;
    min-width: 120px;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  select option { background: var(--surface2); }

  .btn {
    padding: 0.55rem 1.1rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: none; }
  }

  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .modal .form-group {
    margin-bottom: 1rem;
  }

  .modal label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
    font-weight: 500;
  }

  .modal input, .modal select {
    width: 100%;
    min-width: unset;
  }

  .modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }

  /* ── BOARD BADGES ── */
  .badge-cbse { border-top-color: #3498db !important; }
  .badge-icse { border-top-color: #9b59b6 !important; }
  .badge-rbse { border-top-color: #2ecc71 !important; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 0.75rem; }
  .empty p { font-size: 0.92rem; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--success);
    color: #fff;
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
    z-index: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: none; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 1rem;
    margin-top: 0.5rem;
  }

  @media (max-width: 600px) {
    .page-title { font-size: 1.5rem; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    header { padding: 0 1rem; }
    main { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Study<span>Vault</span></div>
  <nav class="breadcrumb" id="breadcrumb"></nav>
</header>

<main id="app"></main>

<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <h3 id="modal-title">Add Item</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Add</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const STORE_KEY = 'studyvault_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return getDefaultData();
}

function saveData() {
  localStorage.setItem(STORE_KEY, JSON.stringify(db));
}

function getDefaultData() {
  return {
    boards: [
      {
        id: 'cbse', name: 'CBSE', icon: '🎓', color: 'badge-cbse',
        desc: 'Central Board of Secondary Education',
        classes: buildDefaultClasses()
      },
      {
        id: 'icse', name: 'ICSE', icon: '📚', color: 'badge-icse',
        desc: 'Indian Certificate of Secondary Education',
        classes: buildDefaultClasses()
      },
      {
        id: 'rbse', name: 'RBSE', icon: '🏫', color: 'badge-rbse',
        desc: 'Rajasthan Board of Secondary Education',
        classes: buildDefaultClasses()
      }
    ]
  };
}

function buildDefaultClasses() {
  return Array.from({length: 12}, (_, i) => ({
    id: `class${i+1}`,
    name: `Class ${i+1}`,
    icon: classIcon(i+1),
    subjects: defaultSubjects(i+1)
  }));
}

function classIcon(n) {
  if (n <= 5) return '🌱';
  if (n <= 8) return '🌿';
  if (n <= 10) return '🌳';
  return '🎯';
}

function defaultSubjects(cls) {
  const base = [
    { id: 'hindi', name: 'Hindi', icon: '📖', chapters: [] },
    { id: 'english', name: 'English', icon: '✏️', chapters: [] },
    { id: 'maths', name: 'Mathematics', icon: '📐', chapters: [] },
    { id: 'evs', name: 'EVS / Science', icon: '🌍', chapters: [] },
  ];
  if (cls >= 6) {
    base.push(
      { id: 'science', name: 'Science', icon: '🔬', chapters: [] },
      { id: 'social', name: 'Social Science', icon: '🗺️', chapters: [] },
      { id: 'sanskrit', name: 'Sanskrit', icon: '📜', chapters: [] }
    );
  }
  if (cls >= 11) {
    base.push(
      { id: 'physics', name: 'Physics', icon: '⚛️', chapters: [] },
      { id: 'chemistry', name: 'Chemistry', icon: '🧪', chapters: [] },
      { id: 'biology', name: 'Biology', icon: '🧬', chapters: [] },
      { id: 'accountancy', name: 'Accountancy', icon: '📊', chapters: [] }
    );
  }
  return base;
}

let db = loadData();

// ─── NAVIGATION STATE ─────────────────────────────────────────────────────────
let nav = { view: 'boards', boardId: null, classId: null, subjectId: null };

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  updateBreadcrumb();
  const app = document.getElementById('app');
  if (nav.view === 'boards') renderBoards(app);
  else if (nav.view === 'classes') renderClasses(app);
  else if (nav.view === 'subjects') renderSubjects(app);
  else if (nav.view === 'chapters') renderChapters(app);
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<span class="crumb" onclick="goTo('boards')">🏠 Home</span>`;

  if (nav.boardId) {
    const board = getBoard();
    html += `<span class="sep">›</span>
             <span class="crumb" onclick="goTo('classes')">${board.name}</span>`;
  }
  if (nav.classId) {
    const cls = getClass();
    html += `<span class="sep">›</span>
             <span class="crumb" onclick="goTo('subjects')">${cls.name}</span>`;
  }
  if (nav.subjectId) {
    const sub = getSubject();
    html += `<span class="sep">›</span>
             <span class="current">${sub.name}</span>`;
  }
  bc.innerHTML = html;
}

// ─── BOARDS VIEW ──────────────────────────────────────────────────────────────
function renderBoards(app) {
  let html = `
    <div class="page-title">📚 Study Boards</div>
    <div class="page-subtitle">Select your board to browse study material</div>
    <div class="card-grid">
  `;
  db.boards.forEach(b => {
    html += `
      <div class="card ${b.color}" onclick="goTo('classes','${b.id}')">
        <span class="card-icon">${b.icon}</span>
        <div class="card-name">${b.name}</div>
        <div class="card-meta">${b.desc}</div>
      </div>
    `;
  });
  html += `</div>`;
  app.innerHTML = html;
}

// ─── CLASSES VIEW ─────────────────────────────────────────────────────────────
function renderClasses(app) {
  const board = getBoard();
  let html = `
    <div class="page-title">${board.icon} ${board.name}</div>
    <div class="page-subtitle">Select a class</div>
    <div class="card-grid">
  `;
  board.classes.forEach(c => {
    const totalChapters = c.subjects.reduce((a, s) => a + s.chapters.length, 0);
    html += `
      <div class="card" onclick="goTo('subjects','${board.id}','${c.id}')">
        <span class="card-icon">${c.icon}</span>
        <div class="card-name">${c.name}</div>
        <div class="card-meta">${c.subjects.length} subjects · ${totalChapters} chapters</div>
      </div>
    `;
  });
  html += `</div>`;
  app.innerHTML = html;
}

// ─── SUBJECTS VIEW ────────────────────────────────────────────────────────────
function renderSubjects(app) {
  const board = getBoard();
  const cls = getClass();
  let html = `
    <div class="page-title">${cls.icon} ${cls.name}</div>
    <div class="page-subtitle">${board.name} · Select a subject</div>
    <div class="card-grid">
  `;
  cls.subjects.forEach(s => {
    html += `
      <div class="card" onclick="goTo('chapters','${board.id}','${cls.id}','${s.id}')">
        <span class="card-icon">${s.icon}</span>
        <div class="card-name">${s.name}</div>
        <div class="card-meta">${s.chapters.length} chapters</div>
      </div>
    `;
  });
  html += `
      <div class="add-card" onclick="showAddSubject()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Subject
      </div>
    </div>
  `;
  app.innerHTML = html;
}

// ─── CHAPTERS VIEW ────────────────────────────────────────────────────────────
function renderChapters(app) {
  const board = getBoard();
  const cls = getClass();
  const sub = getSubject();

  let html = `
    <div class="page-title">${sub.icon} ${sub.name}</div>
    <div class="page-subtitle">${board.name} · ${cls.name} · ${sub.chapters.length} chapters</div>
    <div class="section-label">Chapters</div>
    <div class="chapter-list" id="chapter-list">
  `;

  if (sub.chapters.length === 0) {
    html += `<div class="empty"><div class="empty-icon">📂</div><p>No chapters yet. Add your first chapter below!</p></div>`;
  } else {
    sub.chapters.forEach((ch, idx) => {
      html += renderChapterItem(ch, idx);
    });
  }

  html += `
    </div>
    <button class="add-card" style="width:100%;padding:1rem;" onclick="showAddChapter()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:22px;height:22px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Chapter
    </button>
  `;
  app.innerHTML = html;
}

function renderChapterItem(ch, idx) {
  const matHtml = ch.materials && ch.materials.length > 0
    ? `<ul class="material-list">` + ch.materials.map((m, mi) => `
        <li class="material-item">
          <span class="material-type">${matIcon(m.type)}</span>
          <span class="material-name">${m.name}</span>
          ${m.url ? `<a class="material-link" href="${m.url}" target="_blank">Open</a>` : ''}
          <button class="del-btn" onclick="deleteMaterial(${idx},${mi})" title="Delete">✕</button>
        </li>
      `).join('') + `</ul>`
    : `<p style="color:var(--muted);font-size:0.85rem;margin:0.75rem 0;">No materials yet.</p>`;

  return `
    <div class="chapter-item" id="ch-${idx}">
      <div class="chapter-header" onclick="toggleChapter(${idx})">
        <div class="chapter-num">${idx+1}</div>
        <div class="chapter-name">${ch.name}</div>
        <span class="chapter-toggle">▾</span>
        <button class="del-btn" onclick="event.stopPropagation();deleteChapter(${idx})" title="Delete chapter" style="margin-left:0.5rem;">✕</button>
      </div>
      <div class="chapter-body" id="ch-body-${idx}">
        ${matHtml}
        <div style="margin-top:0.75rem;">
          <button class="btn btn-ghost" onclick="showAddMaterial(${idx})" style="font-size:0.82rem;">
            + Add Material
          </button>
        </div>
        <div class="add-material-form" id="mat-form-${idx}" style="display:none;">
          <div class="form-row">
            <input type="text" id="mat-name-${idx}" placeholder="Material name (e.g. Chapter Notes)" />
            <select id="mat-type-${idx}">
              <option value="pdf">📄 PDF</option>
              <option value="video">🎥 Video</option>
              <option value="notes">📝 Notes</option>
              <option value="quiz">❓ Quiz</option>
              <option value="link">🔗 Link</option>
            </select>
          </div>
          <div class="form-row">
            <input type="url" id="mat-url-${idx}" placeholder="URL / Link (optional)" />
          </div>
          <div style="display:flex;gap:0.5rem;">
            <button class="btn btn-primary" onclick="addMaterial(${idx})">Save</button>
            <button class="btn btn-ghost" onclick="hideMaterialForm(${idx})">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function matIcon(type) {
  const icons = { pdf: '📄', video: '🎥', notes: '📝', quiz: '❓', link: '🔗' };
  return icons[type] || '📎';
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function goTo(view, boardId, classId, subjectId) {
  nav.view = view;
  if (boardId !== undefined) nav.boardId = boardId;
  if (classId !== undefined) nav.classId = classId;
  if (subjectId !== undefined) nav.subjectId = subjectId;
  if (view === 'boards') { nav.boardId = null; nav.classId = null; nav.subjectId = null; }
  if (view === 'classes') { nav.classId = null; nav.subjectId = null; }
  if (view === 'subjects') { nav.subjectId = null; }
  render();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getBoard() { return db.boards.find(b => b.id === nav.boardId); }
function getClass() { return getBoard().classes.find(c => c.id === nav.classId); }
function getSubject() { return getClass().subjects.find(s => s.id === nav.subjectId); }
function uid() { return Math.random().toString(36).slice(2, 9); }

// ─── CHAPTER TOGGLE ───────────────────────────────────────────────────────────
function toggleChapter(idx) {
  const el = document.getElementById(`ch-${idx}`);
  el.classList.toggle('open');
}

// ─── ADD CHAPTER ─────────────────────────────────────────────────────────────
function showAddChapter() {
  openModal('Add New Chapter', `
    <div class="form-group">
      <label>Chapter Name</label>
      <input type="text" id="m-chapter-name" placeholder="e.g. Real Numbers" />
    </div>
  `, () => {
    const name = document.getElementById('m-chapter-name').value.trim();
    if (!name) return alert('Please enter a chapter name.');
    getSubject().chapters.push({ id: uid(), name, materials: [] });
    saveData();
    render();
    toast('Chapter added!');
  });
}

// ─── DELETE CHAPTER ──────────────────────────────────────────────────────────
function deleteChapter(idx) {
  if (!confirm('Delete this chapter and all its materials?')) return;
  getSubject().chapters.splice(idx, 1);
  saveData();
  render();
  toast('Chapter deleted.');
}

// ─── ADD MATERIAL INLINE ─────────────────────────────────────────────────────
function showAddMaterial(idx) {
  document.getElementById(`mat-form-${idx}`).style.display = 'flex';
  document.getElementById(`mat-form-${idx}`).style.flexDirection = 'column';
}
function hideMaterialForm(idx) {
  document.getElementById(`mat-form-${idx}`).style.display = 'none';
}

function addMaterial(idx) {
  const name = document.getElementById(`mat-name-${idx}`).value.trim();
  const type = document.getElementById(`mat-type-${idx}`).value;
  const url = document.getElementById(`mat-url-${idx}`).value.trim();
  if (!name) return alert('Please enter material name.');
  const sub = getSubject();
  if (!sub.chapters[idx].materials) sub.chapters[idx].materials = [];
  sub.chapters[idx].materials.push({ id: uid(), name, type, url });
  saveData();
  render();
  // Re-open the chapter
  setTimeout(() => {
    const el = document.getElementById(`ch-${idx}`);
    if (el) el.classList.add('open');
  }, 50);
  toast('Material added!');
}

function deleteMaterial(chIdx, matIdx) {
  if (!confirm('Delete this material?')) return;
  getSubject().chapters[chIdx].materials.splice(matIdx, 1);
  saveData();
  render();
  setTimeout(() => {
    const el = document.getElementById(`ch-${chIdx}`);
    if (el) el.classList.add('open');
  }, 50);
  toast('Material deleted.');
}

// ─── ADD SUBJECT ─────────────────────────────────────────────────────────────
function showAddSubject() {
  openModal('Add New Subject', `
    <div class="form-group">
      <label>Subject Name</label>
      <input type="text" id="m-sub-name" placeholder="e.g. Computer Science" />
    </div>
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input type="text" id="m-sub-icon" placeholder="💻" maxlength="2" />
    </div>
  `, () => {
    const name = document.getElementById('m-sub-name').value.trim();
    const icon = document.getElementById('m-sub-icon').value.trim() || '📚';
    if (!name) return alert('Please enter subject name.');
    getClass().subjects.push({ id: uid(), name, icon, chapters: [] });
    saveData();
    render();
    toast('Subject added!');
  });
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
let modalCallback = null;
function openModal(title, bodyHtml, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-confirm').onclick = () => { onConfirm(); closeModal(); };
  document.getElementById('modal-overlay').classList.add('show');
  modalCallback = onConfirm;
  setTimeout(() => {
    const first = document.querySelector('#modal-body input');
    if (first) first.focus();
  }, 100);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
