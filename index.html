<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyVault – Smart Study Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #f0a500;
    --accent2: #e05c2a;
    --text: #e8eaf0;
    --muted: #7a8499;
    --success: #2ecc71;
    --danger: #e74c3c;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .logo span { color: var(--text); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    flex-wrap: wrap;
    flex: 1;
    margin: 0 1rem;
  }
  .breadcrumb .crumb { cursor: pointer; transition: color 0.2s; font-weight: 500; }
  .breadcrumb .crumb:hover { color: var(--accent); }
  .breadcrumb .sep { color: var(--border); }
  .breadcrumb .current { color: var(--text); font-weight: 600; }

  /* ── ADMIN BADGE ── */
  .admin-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .btn-login {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-login:hover { background: var(--accent); color: #000; }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }
  .page-subtitle {
    color: var(--muted);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  /* ── GRID ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transition: transform 0.25s ease;
    transform-origin: left;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(240,165,0,0.1); }
  .card:hover::before { transform: scaleX(1); }

  .card-icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
  .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; margin-bottom: 0.3rem; }
  .card-meta { font-size: 0.8rem; color: var(--muted); }

  /* delete x on card - admin only */
  .card-del {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(231,76,60,0.15);
    border: none;
    color: var(--danger);
    width: 24px; height: 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    z-index: 2;
  }
  .card-del:hover { background: var(--danger); color: #fff; }

  /* ── ADD CARD ── */
  .add-card {
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    gap: 0.5rem;
  }
  .add-card:hover { border-color: var(--accent); color: var(--accent); background: rgba(240,165,0,0.04); }
  .add-card svg { width: 28px; height: 28px; }

  /* ── CHAPTER LIST ── */
  .chapter-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; }

  .chapter-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .chapter-item:hover { border-color: var(--accent); }

  .chapter-header {
    display: flex;
    align-items: center;
    padding: 1rem 1.25rem;
    cursor: pointer;
    gap: 1rem;
  }

  .chapter-num {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.8rem;
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .chapter-name { font-weight: 600; font-size: 0.95rem; flex: 1; }
  .chapter-toggle { color: var(--muted); transition: transform 0.3s; font-size: 1.2rem; }
  .chapter-item.open .chapter-toggle { transform: rotate(180deg); }

  .chapter-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 1px solid var(--border);
  }
  .chapter-item.open .chapter-body { display: block; }

  .material-list { list-style: none; margin: 1rem 0; display: flex; flex-direction: column; gap: 0.5rem; }

  .material-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-size: 0.9rem;
  }
  .material-type { font-size: 1rem; }
  .material-name { flex: 1; }

  .material-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .material-link:hover { background: var(--accent); color: #000; }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.9rem;
    transition: color 0.2s;
    padding: 2px;
  }
  .del-btn:hover { color: var(--danger); }

  .add-material-form {
    background: var(--surface2);
    border-radius: 10px;
    padding: 1rem;
    margin-top: 0.75rem;
    flex-direction: column;
    gap: 0.6rem;
    display: none;
  }

  .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.55rem 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
    flex: 1;
    min-width: 120px;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .btn {
    padding: 0.55rem 1.1rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000; }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to { opacity: 1; transform: none; }
  }

  .modal h3 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; margin-bottom: 1.25rem; }
  .modal .form-group { margin-bottom: 1rem; }
  .modal label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.3rem; font-weight: 500; }
  .modal input, .modal select { width: 100%; min-width: unset; }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }

  /* ── LOGIN SCREEN ── */
  .login-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
    animation: modalIn 0.3s ease;
  }

  .login-box .lock-icon { font-size: 3rem; margin-bottom: 1rem; }
  .login-box h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    margin-bottom: 0.4rem;
  }
  .login-box p { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.5rem; }

  .login-box input {
    width: 100%;
    min-width: unset;
    margin-bottom: 1rem;
    text-align: center;
    font-size: 1rem;
    letter-spacing: 2px;
  }

  .login-error {
    color: var(--danger);
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
    display: none;
  }
  .login-error.show { display: block; }

  .login-box .btn-primary { width: 100%; padding: 0.75rem; font-size: 0.95rem; }
  .login-cancel { margin-top: 0.75rem; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; }
  .login-cancel:hover { color: var(--text); }

  /* ── BADGE / BOARD COLORS ── */
  .badge-cbse::before { background: #3498db !important; transform: scaleX(1) !important; }
  .badge-icse::before { background: #9b59b6 !important; transform: scaleX(1) !important; }
  .badge-rbse::before { background: #2ecc71 !important; transform: scaleX(1) !important; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 0.75rem; }
  .empty p { font-size: 0.92rem; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--success);
    color: #fff;
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
    z-index: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: none; }

  .section-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* view-only notice */
  .view-notice {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    font-size: 0.83rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  @media (max-width: 600px) {
    .page-title { font-size: 1.5rem; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    header { padding: 0 1rem; }
    main { padding: 1.5rem 1rem; }
    .breadcrumb { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Study<span>Vault</span></div>
  <nav class="breadcrumb" id="breadcrumb"></nav>
  <div class="header-right">
    <div id="admin-badge" style="display:none;" class="admin-badge">👑 Admin</div>
    <button class="btn-login" id="login-btn" onclick="showLogin()">Admin Login</button>
    <button class="btn-logout" id="logout-btn" style="display:none;" onclick="doLogout()">Logout</button>
  </div>
</header>

<main id="app"></main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen" style="display:none;">
  <div class="login-box">
    <div class="lock-icon">🔐</div>
    <h2>Admin Login</h2>
    <p>Enter admin password to manage content</p>
    <input type="password" id="pwd-input" placeholder="Enter password" onkeydown="if(event.key==='Enter') doLogin()" />
    <div class="login-error" id="login-error">❌ Wrong password! Try again.</div>
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
    <br>
    <button class="login-cancel" onclick="hideLogin()">Cancel</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add Item</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Add</button>
    </div>
  </div>
</div>

<script>
// ─── ADMIN PASSWORD ───────────────────────────────────────────────────────────
const ADMIN_PASSWORD = 'StudyVault@2024';

// ─── STATE ───────────────────────────────────────────────────────────────────
const STORE_KEY = 'studyvault_data';
let isAdmin = false;

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return getDefaultData();
}

function saveData() {
  localStorage.setItem(STORE_KEY, JSON.stringify(db));
}

function getDefaultData() {
  return {
    boards: [
      { id: 'cbse', name: 'CBSE', icon: '🎓', colorClass: 'badge-cbse', desc: 'Central Board of Secondary Education', classes: buildDefaultClasses() },
      { id: 'icse', name: 'ICSE', icon: '📚', colorClass: 'badge-icse', desc: 'Indian Certificate of Secondary Education', classes: buildDefaultClasses() },
      { id: 'rbse', name: 'RBSE', icon: '🏫', colorClass: 'badge-rbse', desc: 'Rajasthan Board of Secondary Education', classes: buildDefaultClasses() }
    ]
  };
}

function buildDefaultClasses() {
  return Array.from({length: 12}, (_, i) => ({
    id: 'class'+(i+1),
    name: 'Class '+(i+1),
    icon: i < 5 ? '🌱' : i < 8 ? '🌿' : i < 10 ? '🌳' : '🎯',
    subjects: defaultSubjects(i+1)
  }));
}

function defaultSubjects(cls) {
  const base = [
    { id: 'hindi', name: 'Hindi', icon: '📖', chapters: [] },
    { id: 'english', name: 'English', icon: '✏️', chapters: [] },
    { id: 'maths', name: 'Mathematics', icon: '📐', chapters: [] },
    { id: 'evs', name: 'EVS / Science', icon: '🌍', chapters: [] },
  ];
  if (cls >= 6) {
    base.push(
      { id: 'science', name: 'Science', icon: '🔬', chapters: [] },
      { id: 'social', name: 'Social Science', icon: '🗺️', chapters: [] },
      { id: 'sanskrit', name: 'Sanskrit', icon: '📜', chapters: [] }
    );
  }
  if (cls >= 11) {
    base.push(
      { id: 'physics', name: 'Physics', icon: '⚛️', chapters: [] },
      { id: 'chemistry', name: 'Chemistry', icon: '🧪', chapters: [] },
      { id: 'biology', name: 'Biology', icon: '🧬', chapters: [] },
      { id: 'accountancy', name: 'Accountancy', icon: '📊', chapters: [] }
    );
  }
  return base;
}

let db = loadData();
let nav = { view: 'boards', boardId: null, classId: null, subjectId: null };

// ─── ADMIN LOGIN ──────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
  document.getElementById('login-error').classList.remove('show');
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
}

function hideLogin() {
  document.getElementById('login-screen').style.display = 'none';
}

function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    isAdmin = true;
    hideLogin();
    document.getElementById('admin-badge').style.display = 'flex';
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'flex';
    render();
    toast('Welcome Admin! 👑');
  } else {
    document.getElementById('login-error').classList.add('show');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

function doLogout() {
  isAdmin = false;
  document.getElementById('admin-badge').style.display = 'none';
  document.getElementById('login-btn').style.display = 'flex';
  document.getElementById('logout-btn').style.display = 'none';
  render();
  toast('Logged out.');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  updateBreadcrumb();
  const app = document.getElementById('app');
  if (nav.view === 'boards') renderBoards(app);
  else if (nav.view === 'classes') renderClasses(app);
  else if (nav.view === 'subjects') renderSubjects(app);
  else if (nav.view === 'chapters') renderChapters(app);
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = `<span class="crumb" onclick="goTo('boards')">🏠 Home</span>`;
  if (nav.boardId) {
    const board = getBoard();
    html += `<span class="sep">›</span><span class="crumb" onclick="goTo('classes')">${board.name}</span>`;
  }
  if (nav.classId) {
    const cls = getClass();
    html += `<span class="sep">›</span><span class="crumb" onclick="goTo('subjects')">${cls.name}</span>`;
  }
  if (nav.subjectId) {
    const sub = getSubject();
    html += `<span class="sep">›</span><span class="current">${sub.name}</span>`;
  }
  bc.innerHTML = html;
}

function viewNotice() {
  if (isAdmin) return '';
  return `<div class="view-notice">👁️ You are viewing as a student. <strong style="color:var(--text);margin-left:4px;">Admin login</strong> required to add or delete content.</div>`;
}

// ─── BOARDS VIEW ──────────────────────────────────────────────────────────────
function renderBoards(app) {
  let html = `
    <div class="page-title">📚 Study Boards</div>
    <div class="page-subtitle">Select your board to browse study material</div>
    ${viewNotice()}
    <div class="card-grid">
  `;

  db.boards.forEach((b, bi) => {
    html += `
      <div class="card ${b.colorClass}" onclick="goTo('classes','${b.id}')">
        ${isAdmin ? `<button class="card-del" onclick="event.stopPropagation();deleteBoard(${bi})" title="Delete board">✕</button>` : ''}
        <span class="card-icon">${b.icon}</span>
        <div class="card-name">${b.name}</div>
        <div class="card-meta">${b.desc}</div>
      </div>
    `;
  });

  if (isAdmin) {
    html += `
      <div class="add-card" onclick="showAddBoard()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Board
      </div>
    `;
  }

  html += `</div>`;
  app.innerHTML = html;
}

// ─── CLASSES VIEW ─────────────────────────────────────────────────────────────
function renderClasses(app) {
  const board = getBoard();
  let html = `
    <div class="page-title">${board.icon} ${board.name}</div>
    <div class="page-subtitle">Select a class</div>
    ${viewNotice()}
    <div class="card-grid">
  `;
  board.classes.forEach((c, ci) => {
    const total = c.subjects.reduce((a, s) => a + s.chapters.length, 0);
    html += `
      <div class="card" onclick="goTo('subjects','${board.id}','${c.id}')">
        <span class="card-icon">${c.icon}</span>
        <div class="card-name">${c.name}</div>
        <div class="card-meta">${c.subjects.length} subjects · ${total} chapters</div>
      </div>
    `;
  });
  html += `</div>`;
  app.innerHTML = html;
}

// ─── SUBJECTS VIEW ────────────────────────────────────────────────────────────
function renderSubjects(app) {
  const board = getBoard();
  const cls = getClass();
  let html = `
    <div class="page-title">${cls.icon} ${cls.name}</div>
    <div class="page-subtitle">${board.name} · Select a subject</div>
    ${viewNotice()}
    <div class="card-grid">
  `;
  cls.subjects.forEach((s, si) => {
    html += `
      <div class="card" onclick="goTo('chapters','${board.id}','${cls.id}','${s.id}')">
        ${isAdmin ? `<button class="card-del" onclick="event.stopPropagation();deleteSubject(${si})" title="Delete subject">✕</button>` : ''}
        <span class="card-icon">${s.icon}</span>
        <div class="card-name">${s.name}</div>
        <div class="card-meta">${s.chapters.length} chapters</div>
      </div>
    `;
  });
  if (isAdmin) {
    html += `
      <div class="add-card" onclick="showAddSubject()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Subject
      </div>
    `;
  }
  html += `</div>`;
  app.innerHTML = html;
}

// ─── CHAPTERS VIEW ────────────────────────────────────────────────────────────
function renderChapters(app) {
  const board = getBoard();
  const cls = getClass();
  const sub = getSubject();

  let html = `
    <div class="page-title">${sub.icon} ${sub.name}</div>
    <div class="page-subtitle">${board.name} · ${cls.name} · ${sub.chapters.length} chapters</div>
    ${viewNotice()}
    <div class="section-label">Chapters</div>
    <div class="chapter-list" id="chapter-list">
  `;

  if (sub.chapters.length === 0) {
    html += `<div class="empty"><div class="empty-icon">📂</div><p>${isAdmin ? 'No chapters yet. Add your first chapter below!' : 'No chapters added yet.'}</p></div>`;
  } else {
    sub.chapters.forEach((ch, idx) => {
      html += renderChapterItem(ch, idx);
    });
  }

  html += `</div>`;

  if (isAdmin) {
    html += `
      <button class="add-card" style="width:100%;padding:1rem;" onclick="showAddChapter()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:22px;height:22px"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Chapter
      </button>
    `;
  }

  app.innerHTML = html;
}

function renderChapterItem(ch, idx) {
  const matHtml = ch.materials && ch.materials.length > 0
    ? `<ul class="material-list">` + ch.materials.map((m, mi) => `
        <li class="material-item">
          <span class="material-type">${matIcon(m.type)}</span>
          <span class="material-name">${m.name}</span>
          ${m.url ? `<a class="material-link" href="${m.url}" target="_blank">Open</a>` : ''}
          ${isAdmin ? `<button class="del-btn" onclick="deleteMaterial(${idx},${mi})" title="Delete">✕</button>` : ''}
        </li>
      `).join('') + `</ul>`
    : `<p style="color:var(--muted);font-size:0.85rem;margin:0.75rem 0;">No materials yet.</p>`;

  const addMatBtn = isAdmin ? `
    <div style="margin-top:0.75rem;">
      <button class="btn btn-ghost" onclick="showAddMaterial(${idx})" style="font-size:0.82rem;">+ Add Material</button>
    </div>
    <div class="add-material-form" id="mat-form-${idx}">
      <div class="form-row">
        <input type="text" id="mat-name-${idx}" placeholder="Material name (e.g. Chapter Notes)" />
        <select id="mat-type-${idx}">
          <option value="pdf">📄 PDF</option>
          <option value="video">🎥 Video</option>
          <option value="notes">📝 Notes</option>
          <option value="quiz">❓ Quiz</option>
          <option value="link">🔗 Link</option>
        </select>
      </div>
      <div class="form-row">
        <input type="url" id="mat-url-${idx}" placeholder="URL / Link (optional)" />
      </div>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn btn-primary" onclick="addMaterial(${idx})">Save</button>
        <button class="btn btn-ghost" onclick="hideMaterialForm(${idx})">Cancel</button>
      </div>
    </div>
  ` : '';

  const delChBtn = isAdmin
    ? `<button class="del-btn" onclick="event.stopPropagation();deleteChapter(${idx})" title="Delete chapter" style="margin-left:0.5rem;">✕</button>`
    : '';

  return `
    <div class="chapter-item" id="ch-${idx}">
      <div class="chapter-header" onclick="toggleChapter(${idx})">
        <div class="chapter-num">${idx+1}</div>
        <div class="chapter-name">${ch.name}</div>
        <span class="chapter-toggle">▾</span>
        ${delChBtn}
      </div>
      <div class="chapter-body" id="ch-body-${idx}">
        ${matHtml}
        ${addMatBtn}
      </div>
    </div>
  `;
}

function matIcon(type) {
  return { pdf: '📄', video: '🎥', notes: '📝', quiz: '❓', link: '🔗' }[type] || '📎';
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function goTo(view, boardId, classId, subjectId) {
  nav.view = view;
  if (boardId !== undefined) nav.boardId = boardId;
  if (classId !== undefined) nav.classId = classId;
  if (subjectId !== undefined) nav.subjectId = subjectId;
  if (view === 'boards') { nav.boardId = null; nav.classId = null; nav.subjectId = null; }
  if (view === 'classes') { nav.classId = null; nav.subjectId = null; }
  if (view === 'subjects') { nav.subjectId = null; }
  render();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getBoard() { return db.boards.find(b => b.id === nav.boardId); }
function getClass() { return getBoard().classes.find(c => c.id === nav.classId); }
function getSubject() { return getClass().subjects.find(s => s.id === nav.subjectId); }
function uid() { return Math.random().toString(36).slice(2, 9); }

function toggleChapter(idx) {
  document.getElementById(`ch-${idx}`).classList.toggle('open');
}

// ─── ADD / DELETE BOARD ───────────────────────────────────────────────────────
function showAddBoard() {
  openModal('Add New Board', `
    <div class="form-group">
      <label>Board Name</label>
      <input type="text" id="m-board-name" placeholder="e.g. CBSE, ICSE, UP Board" />
    </div>
    <div class="form-group">
      <label>Short Description</label>
      <input type="text" id="m-board-desc" placeholder="e.g. Uttar Pradesh Board" />
    </div>
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input type="text" id="m-board-icon" placeholder="🏫" maxlength="2" />
    </div>
  `, () => {
    const name = document.getElementById('m-board-name').value.trim();
    const desc = document.getElementById('m-board-desc').value.trim();
    const icon = document.getElementById('m-board-icon').value.trim() || '🏫';
    if (!name) return alert('Please enter board name.');
    db.boards.push({ id: uid(), name, icon, colorClass: '', desc, classes: buildDefaultClasses() });
    saveData(); render(); toast('Board added! ✅');
  });
}

function deleteBoard(bi) {
  if (!confirm(`Delete board "${db.boards[bi].name}" and ALL its data?`)) return;
  db.boards.splice(bi, 1);
  saveData(); render(); toast('Board deleted.');
}

// ─── ADD / DELETE SUBJECT ─────────────────────────────────────────────────────
function showAddSubject() {
  openModal('Add New Subject', `
    <div class="form-group">
      <label>Subject Name</label>
      <input type="text" id="m-sub-name" placeholder="e.g. Computer Science" />
    </div>
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input type="text" id="m-sub-icon" placeholder="💻" maxlength="2" />
    </div>
  `, () => {
    const name = document.getElementById('m-sub-name').value.trim();
    const icon = document.getElementById('m-sub-icon').value.trim() || '📚';
    if (!name) return alert('Please enter subject name.');
    getClass().subjects.push({ id: uid(), name, icon, chapters: [] });
    saveData(); render(); toast('Subject added! ✅');
  });
}

function deleteSubject(si) {
  const sub = getClass().subjects[si];
  if (!confirm(`Delete subject "${sub.name}" and all its chapters?`)) return;
  getClass().subjects.splice(si, 1);
  saveData(); render(); toast('Subject deleted.');
}

// ─── ADD / DELETE CHAPTER ─────────────────────────────────────────────────────
function showAddChapter() {
  openModal('Add New Chapter', `
    <div class="form-group">
      <label>Chapter Name</label>
      <input type="text" id="m-chapter-name" placeholder="e.g. Real Numbers" />
    </div>
  `, () => {
    const name = document.getElementById('m-chapter-name').value.trim();
    if (!name) return alert('Please enter chapter name.');
    getSubject().chapters.push({ id: uid(), name, materials: [] });
    saveData(); render(); toast('Chapter added! ✅');
  });
}

function deleteChapter(idx) {
  if (!confirm('Delete this chapter and all its materials?')) return;
  getSubject().chapters.splice(idx, 1);
  saveData(); render(); toast('Chapter deleted.');
}

// ─── ADD / DELETE MATERIAL ────────────────────────────────────────────────────
function showAddMaterial(idx) {
  const form = document.getElementById(`mat-form-${idx}`);
  form.style.display = 'flex';
  form.style.flexDirection = 'column';
}
function hideMaterialForm(idx) {
  document.getElementById(`mat-form-${idx}`).style.display = 'none';
}

function addMaterial(idx) {
  const name = document.getElementById(`mat-name-${idx}`).value.trim();
  const type = document.getElementById(`mat-type-${idx}`).value;
  const url  = document.getElementById(`mat-url-${idx}`).value.trim();
  if (!name) return alert('Please enter material name.');
  const sub = getSubject();
  if (!sub.chapters[idx].materials) sub.chapters[idx].materials = [];
  sub.chapters[idx].materials.push({ id: uid(), name, type, url });
  saveData(); render();
  setTimeout(() => { const el = document.getElementById(`ch-${idx}`); if(el) el.classList.add('open'); }, 50);
  toast('Material added! ✅');
}

function deleteMaterial(chIdx, matIdx) {
  if (!confirm('Delete this material?')) return;
  getSubject().chapters[chIdx].materials.splice(matIdx, 1);
  saveData(); render();
  setTimeout(() => { const el = document.getElementById(`ch-${chIdx}`); if(el) el.classList.add('open'); }, 50);
  toast('Material deleted.');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title, bodyHtml, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-confirm').onclick = () => { onConfirm(); closeModal(); };
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => { const f = document.querySelector('#modal-body input'); if(f) f.focus(); }, 100);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
document.getElementById('modal-overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
